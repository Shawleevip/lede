name: OpenWrt_x86_6.12

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 8,15 * * *"
  release:
    types: [published]


jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    name: OpenWrt ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [x86]

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      # ------------------------------------------------------------------ #
      # 2. 磁盘空间最大化
      # ------------------------------------------------------------------ #
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096         # 适当增大，避免编译后期空间不足
          temp-reserve-mb: 1024
          swap-size-mb: 8192            # 增加 swap，防止大包编译 OOM
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # ------------------------------------------------------------------ #
      # 3. 系统依赖 & 时区
      # ------------------------------------------------------------------ #
      - name: Space cleanup & Timezone
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /etc/mysql /etc/php || true
          sudo -E apt-get update
          sudo -E apt-get -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev scdoc
          sudo -E timedatectl set-timezone "Asia/Shanghai"
      # ------------------------------------------------------------------ #
      # 4. 获取构建日期
      # ------------------------------------------------------------------ #
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y.%m.%d-%H%M')"   >> $GITHUB_ENV
          echo "date2=$(date +'%m/%d %Y')"        >> $GITHUB_ENV
          echo "date3=$(date +'%m.%d')"           >> $GITHUB_ENV
          VERSION="$(echo "${{ github.event.action }}" | grep -Eo '[0-9.]+' | head -1)" || true
          [ "$VERSION" ] && echo "VERSION=$VERSION" >> $GITHUB_ENV \
                         || echo "VERSION=$(date +'%m.%d')" >> $GITHUB_ENV
      # ------------------------------------------------------------------ #
      # 5. 拉取源码
      # ------------------------------------------------------------------ #
      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 https://github.com/coolsnowwolf/lede openwrt
      # ------------------------------------------------------------------ #
      # 6. 更新 feeds
      # ------------------------------------------------------------------ #
      - name: Update feeds
        working-directory: ./openwrt
        run: |
          sed -i '1i src-git small      https://github.com/kenzok8/small'                       feeds.conf.default
          sed -i '2i src-git vmware     https://github.com/vmware/open-vm-tools'                feeds.conf.default
          sed -i '3i src-git taskplan   https://github.com/sirpdboy/luci-app-taskplan'          feeds.conf.default
          sed -i '4i src-git rtp2httpd  https://github.com/stackia/rtp2httpd.git'               feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      # ------------------------------------------------------------------ #
      # 7. 替换主题
      # ------------------------------------------------------------------ #
      - name: Replace themes (argon)
        working-directory: ./openwrt
        run: |
          rm -rf package/feeds/luci/luci-theme-argon
          rm -rf package/feeds/luci/luci-app-argon-config
          rm -rf package/feeds/luci/luci-theme-infinityfreedom
          rm -rf package/feeds/luci/luci/luci-theme-design
          git clone -b master https://github.com/jerrykuku/luci-theme-argon.git      package/feeds/luci/luci-theme-argon
          git clone -b master https://github.com/jerrykuku/luci-app-argon-config.git package/feeds/luci/luci-app-argon-config
      # ------------------------------------------------------------------ #
      # 8. 生成 .config
      # ------------------------------------------------------------------ #
      - name: Generate .config
        working-directory: ./openwrt
        run: |
          rm -f .config*
          touch .config
          # ── 目标平台 ──────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          CONFIG_TESTING_KERNEL=n
          EOF
          # ── 分区大小 ──────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_TARGET_KERNEL_PARTSIZE=128
          CONFIG_TARGET_ROOTFS_PARTSIZE=640
          EOF
          # ── 固件压缩 / UEFI ───────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_EFI_IMAGES=y
          EOF
          # ── IPv6 ──────────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          EOF
          # ── 多文件系统 ────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_kmod-fs-nfs=y
          CONFIG_PACKAGE_kmod-fs-nfs-common=y
          CONFIG_PACKAGE_kmod-fs-nfs-v3=y
          CONFIG_PACKAGE_kmod-fs-nfs-v4=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          CONFIG_PACKAGE_kmod-fs-squashfs=y
          EOF
          # ── Bonding ───────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_kmod-bonding=y
          CONFIG_PACKAGE_proto-bonding=y
          CONFIG_PACKAGE_luci-proto-bonding=y
          EOF
          # ── USB 支持 ──────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-ohci-pci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb2-pci=y
          CONFIG_PACKAGE_kmod-usb3=y
          EOF
          # ── LuCI 插件 ─────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-eqos=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-nfs=y
          CONFIG_PACKAGE_luci-app-webadmin=y
          CONFIG_PACKAGE_luci-app-wrtbwmon=y
          CONFIG_PACKAGE_luci-app-rtp2httpd=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-openvpn=y
          CONFIG_PACKAGE_luci-app-openvpn-server=y
          CONFIG_PACKAGE_openvpn-easy-rsa=y
          CONFIG_PACKAGE_kmod-wireguard=y
          CONFIG_PACKAGE_luci-proto-wireguard=y
          CONFIG_PACKAGE_wireguard-tools=y
          CONFIG_PACKAGE_luci-app-taskplan=y
          CONFIG_PACKAGE_luci-app-ssr-plus=n
          # 以下插件按需开启，取消注释即可
          # CONFIG_PACKAGE_luci-app-adbyby-plus=y
          # CONFIG_PACKAGE_luci-app-aria2=y
          # CONFIG_PACKAGE_luci-app-docker=y
          # CONFIG_PACKAGE_luci-app-frpc=y
          # CONFIG_PACKAGE_luci-app-frps=y
          # CONFIG_PACKAGE_luci-app-qbittorrent=y
          # CONFIG_PACKAGE_luci-app-mwan3=y
          # CONFIG_PACKAGE_luci-app-adguardhome=y
          # CONFIG_PACKAGE_luci-app-smartdns=y
          # CONFIG_PACKAGE_luci-app-mosdns=y
          # CONFIG_PACKAGE_luci-app-zerotier=y
          # CONFIG_PACKAGE_luci-app-mihomo=y
          # CONFIG_PACKAGE_luci-app-homeproxy=y
          # CONFIG_PACKAGE_luci-app-lucky=y
          EOF
          # ── 主题 ──────────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-argon-config=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          EOF
          # ── 常用软件包 ────────────────────────────────────────────────
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_screen=y
          CONFIG_PACKAGE_tree=y
          CONFIG_PACKAGE_vim-fuller=n
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_acme=y
          CONFIG_PACKAGE_acme-dnsapi=y
          CONFIG_PACKAGE_haproxy=y
          CONFIG_PACKAGE_socat=y
          CONFIG_SOCAT_SSL=y
          CONFIG_PACKAGE_chinadns-gn=y
          CONFIG_PACKAGE_open-vm-tools=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_iftop=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_pv=y
          CONFIG_PACKAGE_bind-host=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_DEVEL=y
          EOF
          # 去除行首空白后生成最终配置
          sed -i 's/^[ \t]*//g' .config
          make defconfig
      # ------------------------------------------------------------------ #
      # 9. 下载源码包（带完整性检查）
      # ------------------------------------------------------------------ #
      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j8
          # 删除下载不完整的文件（< 1 KB）
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -delete
      # ------------------------------------------------------------------ #
      # 10. 编译固件
      # ------------------------------------------------------------------ #
      - name: Compile firmware
        id: compile
        working-directory: ./openwrt
        run: |
          echo "正在编译，线程数: $(nproc)"
          make -j$(nproc) 2>&1 | tee /tmp/build.log || {
            echo "多线程编译失败，切换到单线程详细模式..."
            make -j1 V=s 2>&1 | tee /tmp/build.log
          }
          echo "status=success" >> $GITHUB_OUTPUT
      # ------------------------------------------------------------------ #
      # 11. 整理产物
      # ------------------------------------------------------------------ #
      - name: Prepare artifacts
        if: steps.compile.outputs.status == 'success'
        working-directory: ./openwrt
        run: |
          mkdir -p ./artifact/{firmware,package,buildinfo}
          # 删除不需要的文件
          find ./bin/targets/ -type f \( \
            -name "openwrt-x86-64-generic-kernel.bin" \
            -o -name "openwrt-x86-64-generic-squashfs-rootfs.img.gz" \
          \) -delete
          find ./bin/targets/ -type d -name "packages" -exec rm -rf {} + 2>/dev/null || true
          # 复制产物
          cp -rf $(find ./bin/targets/ -type f)                                                     ./artifact/firmware/
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk")                                      ./artifact/package/
          cp -rf $(find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \))     ./artifact/buildinfo/
      # ------------------------------------------------------------------ #
      # 12. 上传构建信息
      # ------------------------------------------------------------------ #
      - name: Upload buildinfo
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date }}_OpenWrt_x86_buildinfo_6.12.x
          path: ./openwrt/artifact/buildinfo/
          retention-days: 30

      # ------------------------------------------------------------------ #
      # 13. 上传 IPK 包
      # ------------------------------------------------------------------ #
      - name: Upload packages
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date }}_OpenWrt_x86_package_6.12.x
          path: ./openwrt/artifact/package/
          retention-days: 30

      # ------------------------------------------------------------------ #
      # 14. 上传固件
      # ------------------------------------------------------------------ #
      - name: Upload firmware
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date }}_OpenWrt_x86_firmware_6.12.x
          path: ./openwrt/bin/targets/
          retention-days: 30

      # ------------------------------------------------------------------ #
      # 15. 清理旧 workflow 运行记录
      # ------------------------------------------------------------------ #
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        continue-on-error: true
        with:
          token: ${{ secrets.SEARIY_TOKEN }}
          retain_days: 20
          keep_minimum_runs: 3
